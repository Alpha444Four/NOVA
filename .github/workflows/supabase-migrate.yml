name: Supabase migrate

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Apply schema
        run: node scripts/apply-supabase-sql.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.POSTGRES_URL }}
